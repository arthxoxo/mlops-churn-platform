name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.S3_BUCKET }}

jobs:
  # ── Job 1: Code Quality ─────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ pipelines/ monitoring/ tests/

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short

  # ── Job 2: Train & Upload Model ─────────────────────────────────────────────
  train-and-upload:
    name: Train Model & Upload to S3
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download data from S3
        run: |
          mkdir -p data/raw
          aws s3 cp s3://$S3_BUCKET/raw/telco-churn.csv data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv

      - name: Run full pipeline (preprocess → train → evaluate → upload)
        env:
          PYTHONPATH: ${{ github.workspace }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          ACCURACY_THRESHOLD: "0.80"
        run: python pipelines/local_pipeline.py

      - name: Post pipeline status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const msg = `${status} ML Pipeline ${('${{ job.status }}').toUpperCase()} for commit ${{ github.sha }}`;
            // Only comment on PRs
            if (context.issue?.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: msg
              });
            }
