name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

  
env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.S3_BUCKET }}

jobs:
  # ── Job 1: Code Quality ─────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ pipelines/ monitoring/ tests/

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short

  # ── Job 2: Train & Upload Model ─────────────────────────────────────────────
  train-and-upload:
    name: Train Model & Upload to S3
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      # Force Linux-safe paths (cross-platform CI safety)
      HOME: ${{ github.workspace }}
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      KAGGLEHUB_CACHE: ${{ github.workspace }}/.cache/kagglehub
      SKLEARN_CONFIG_HOME: ${{ github.workspace }}/.cache/sklearn
      TMPDIR: ${{ github.workspace }}/.tmp
      # AWS secrets exposed as env vars for use in conditionals
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime directories
        run: mkdir -p "$HOME" "$XDG_CACHE_HOME" "$KAGGLEHUB_CACHE" "$TMPDIR"

      - name: Clean environment-specific artifacts (avoid /Users paths from macOS)
        run: |
          # Remove MLflow and model artifacts that might have /Users paths
          rm -rf mlruns/ artifacts/ .mlflow/ .sklearn_config/ 2>/dev/null || true
          
          # Remove cached model files 
          rm -rf models/*.joblib models/*.pkl 2>/dev/null || true
          
          # Remove Python cache and environment cache
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          rm -rf .cache/ .kagglehub/ .tmp/ 2>/dev/null || true
          
          echo "✅ Cleaned environment-specific files"

      - name: Validate AWS configuration
        run: |
          test -n "${{ secrets.S3_BUCKET }}" || (echo "Missing S3_BUCKET secret" && exit 1)
          if [ -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "Using OIDC role authentication"
          else
            test -n "${{ secrets.AWS_ACCESS_KEY_ID }}" || (echo "Missing AWS_ACCESS_KEY_ID secret" && exit 1)
            test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "Missing AWS_SECRET_ACCESS_KEY secret" && exit 1)
            echo "Using static key authentication"
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static keys)
        if: ${{ !env.AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check S3 access
        id: s3_access
        run: |
          if aws s3api list-objects-v2 --bucket "$S3_BUCKET" --max-items 1 >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "S3 access check passed."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "S3 access check failed (likely 403). Running in local-only mode."
          fi

      - name: Download data from S3
        if: steps.s3_access.outputs.enabled == 'true'
        env:
          HOME: ${{ github.workspace }}
          XDG_CACHE_HOME: ${{ github.workspace }}/.cache
          KAGGLEHUB_CACHE: ${{ github.workspace }}/.cache/kagglehub
        run: |
          set -euo pipefail
          mkdir -p data/raw
          target_file="data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv"

          if [ -f "$target_file" ]; then
            echo "Using dataset already present in repository: $target_file"
            exit 0
          fi

          downloaded_from_s3="false"
          for key in "raw/WA_Fn-UseC_-Telco-Customer-Churn.csv" "raw/telco-churn.csv"; do
            if aws s3 cp "s3://$S3_BUCKET/$key" "$target_file" >/dev/null 2>&1; then
              echo "Downloaded dataset from s3://$S3_BUCKET/$key"
              downloaded_from_s3="true"
              break
            fi
          done

          if [ "$downloaded_from_s3" = "true" ]; then
            exit 0
          fi

          echo "Could not download dataset from s3://$S3_BUCKET/raw/ (missing key or access denied). Falling back to KaggleHub download."
          python -m pip install kagglehub
          mkdir -p "$XDG_CACHE_HOME" "$KAGGLEHUB_CACHE"

          python - <<'PY'
          import shutil
          from pathlib import Path
          import kagglehub

          src_dir = Path(kagglehub.dataset_download("blastchar/telco-customer-churn"))
          src_file = src_dir / "WA_Fn-UseC_-Telco-Customer-Churn.csv"
          dst_file = Path("data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv")
          dst_file.parent.mkdir(parents=True, exist_ok=True)
          shutil.copy2(src_file, dst_file)
          print(f"Downloaded fallback dataset to {dst_file}")
          PY

          if [ ! -f "$target_file" ]; then
            echo "Failed to obtain dataset from local file, S3, and Kaggle fallback." >&2
            exit 1
          fi

      - name: Run full pipeline (preprocess → train → evaluate → upload)
        env:
          PYTHONPATH: ${{ github.workspace }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          ACCURACY_THRESHOLD: "0.80"
          HOME: ${{ github.workspace }}
          XDG_CACHE_HOME: ${{ github.workspace }}/.cache
          KAGGLEHUB_CACHE: ${{ github.workspace }}/.cache/kagglehub
          MLFLOW_TRACKING_URI: ${{ github.workspace }}/mlruns
        run: |
          mkdir -p "${XDG_CACHE_HOME}" "${KAGGLEHUB_CACHE}"
          if [ "${{ steps.s3_access.outputs.enabled }}" = "true" ]; then
            python pipelines/local_pipeline.py
          else
            python pipelines/local_pipeline.py --skip-upload
          fi

      - name: Post pipeline status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const msg = `${status} ML Pipeline ${('${{ job.status }}').toUpperCase()} for commit ${{ github.sha }}`;
            // Only comment on PRs
            if (context.issue?.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: msg
              });
            }
