name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

  
env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.S3_BUCKET }}

jobs:
  # ── Job 1: Code Quality ─────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ pipelines/ monitoring/ tests/

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short

  # ── Job 2: Train & Upload Model ─────────────────────────────────────────────
  train-and-upload:
    name: Train Model & Upload to S3
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate AWS configuration
        run: |
          test -n "${{ secrets.S3_BUCKET }}" || (echo "Missing S3_BUCKET secret" && exit 1)
          if [ -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "Using OIDC role authentication"
          else
            test -n "${{ secrets.AWS_ACCESS_KEY_ID }}" || (echo "Missing AWS_ACCESS_KEY_ID secret" && exit 1)
            test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "Missing AWS_SECRET_ACCESS_KEY secret" && exit 1)
            echo "Using static key authentication"
          fi

      - name: Configure AWS credentials (OIDC)
        if: env.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static keys)
        if: env.AWS_ROLE_TO_ASSUME == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download data from S3
        run: |
          set -euo pipefail
          mkdir -p data/raw
          found_key=""
          for key in "raw/WA_Fn-UseC_-Telco-Customer-Churn.csv" "raw/telco-churn.csv"; do
            if aws s3api head-object --bucket "$S3_BUCKET" --key "$key" >/dev/null 2>&1; then
              found_key="$key"
              break
            fi
          done

          if [ -n "$found_key" ]; then
            aws s3 cp "s3://$S3_BUCKET/$found_key" data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
            echo "Downloaded dataset from s3://$S3_BUCKET/$found_key"
          else
            echo "Dataset not found in s3://$S3_BUCKET/raw/. Falling back to KaggleHub download."
            python -m pip install kagglehub
            python - <<'PY'
            import shutil
            from pathlib import Path
            import kagglehub

            src_dir = Path(kagglehub.dataset_download("blastchar/telco-customer-churn"))
            src_file = src_dir / "WA_Fn-UseC_-Telco-Customer-Churn.csv"
            dst_file = Path("data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv")
            dst_file.parent.mkdir(parents=True, exist_ok=True)
            shutil.copy2(src_file, dst_file)
            print(f"Downloaded fallback dataset to {dst_file}")
            PY
          fi

      - name: Run full pipeline (preprocess → train → evaluate → upload)
        env:
          PYTHONPATH: ${{ github.workspace }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          ACCURACY_THRESHOLD: "0.80"
        run: python pipelines/local_pipeline.py

      - name: Post pipeline status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const msg = `${status} ML Pipeline ${('${{ job.status }}').toUpperCase()} for commit ${{ github.sha }}`;
            // Only comment on PRs
            if (context.issue?.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: msg
              });
            }
