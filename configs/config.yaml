# ── Project ───────────────────────────────────────────────────────────────────
project:
  name: mlops-churn-platform
  version: "1.0.0"
  description: "Full MLOps platform for customer churn prediction (AWS free tier)"

# ── AWS (free-tier only) ─────────────────────────────────────────────────────
aws:
  region: us-east-1
  s3_bucket: your-mlops-bucket        # <-- change this (free tier: 5GB)

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  raw_path: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
  processed_path: data/processed/train.csv
  target_column: Churn
  test_size: 0.2
  random_state: 42

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  name: xgboost-churn
  type: XGBClassifier
  hyperparameters:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8

# ── Pipeline ──────────────────────────────────────────────────────────────────
pipeline:
  name: churn-prediction-pipeline
  accuracy_threshold: 0.80          # fail pipeline if below this
  execution: local                  # runs locally or in GitHub Actions

# ── Serving ───────────────────────────────────────────────────────────────────
serving:
  # Option 1: Local FastAPI server
  local_port: 8080
  # Option 2: AWS Lambda (free tier: 1M requests/month)
  lambda_function_name: mlops-churn-predict
  lambda_memory_mb: 256
  lambda_timeout_seconds: 30

# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  drift_threshold: 0.20             # alert if drift share > 20%
  schedule: "cron(0 8 * * ? *)"    # run daily at 8 AM UTC
  sns_topic_name: mlops-alerts
  # CloudWatch free tier: 10 custom metrics, 10 alarms
  cloudwatch_namespace: MLOps/ChurnModel

# ── AWS Free Tier Limits (reference) ─────────────────────────────────────────
# S3:         5GB storage, 20k GET, 2k PUT requests/month
# Lambda:     1M requests, 400k GB-seconds/month
# CloudWatch: 10 custom metrics, 10 alarms, 3 dashboards
# SNS:        1M publishes/month
# API Gateway: 1M API calls/month (first 12 months)
